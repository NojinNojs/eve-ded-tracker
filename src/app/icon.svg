<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Solid background to ensure visibility -->
  <rect width="32" height="32" fill="#22d3ee" rx="4" />
  
  <!-- Outer crosshair ring -->
  <circle cx="16" cy="16" r="11" stroke="#1a1a1a" stroke-width="2.5" />
  <!-- Crosshair lines -->
  <line x1="16" y1="2" x2="16" y2="8" stroke="#1a1a1a" stroke-width="2.5" />
  <line x1="16" y1="24" x2="16" y2="30" stroke="#1a1a1a" stroke-width="2.5" />
  <line x1="2" y1="16" x2="8" y2="16" stroke="#1a1a1a" stroke-width="2.5" />
  <line x1="24" y1="16" x2="30" y2="16" stroke="#1a1a1a" stroke-width="2.5" />
  
  <!-- Profit arrow going up-right through the center -->
  <path
    d="M10 22 L16 14 L20 17 L24 9"
    stroke="#1a1a1a"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Arrowhead -->
  <path
    d="M21 9 L24 9 L24 12"
